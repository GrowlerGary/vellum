services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vellum
      POSTGRES_PASSWORD: vellum
      POSTGRES_DB: vellum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/twobitlab/vellum:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public
    environment:
      # ---------------------------------------------------------------------------
      # REQUIRED — Database
      # ---------------------------------------------------------------------------
      DATABASE_URL: postgresql://vellum:vellum@db:5432/vellum

      # ---------------------------------------------------------------------------
      # REQUIRED — Auth (NextAuth v5)
      # Generate AUTH_SECRET with: openssl rand -base64 32
      # ---------------------------------------------------------------------------
      AUTH_SECRET: changeme
      AUTH_URL: http://localhost:3000

      # ---------------------------------------------------------------------------
      # REQUIRED — First admin account (used only during initial seed)
      # ---------------------------------------------------------------------------
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      ADMIN_USERNAME: admin

      # ---------------------------------------------------------------------------
      # OPTIONAL — Metadata APIs (enable the services you want to use)
      # TMDB:      https://www.themoviedb.org/settings/api
      # IGDB:      https://dev.twitch.tv/console  (create a Twitch app)
      # Hardcover: https://hardcover.app/account/api
      # OMDB:      https://www.omdbapi.com/apikey.aspx  (for Rotten Tomatoes scores)
      # ---------------------------------------------------------------------------
      TMDB_API_KEY: ""
      IGDB_CLIENT_ID: ""
      IGDB_CLIENT_SECRET: ""
      HARDCOVER_API_KEY: ""
      OMDB_API_KEY: ""

      # ---------------------------------------------------------------------------
      # OPTIONAL — AI provider for smart features
      # Set AI_PROVIDER to one of: anthropic | openai | ollama
      # Only the keys for the chosen provider are needed.
      # Anthropic: https://console.anthropic.com
      # OpenAI:    https://platform.openai.com
      # ---------------------------------------------------------------------------
      AI_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: llama3

      # ---------------------------------------------------------------------------
      # OPTIONAL — Scrobble webhook secrets
      # Generate each with: openssl rand -hex 32
      # Only set the secrets for webhooks you intend to use.
      # ---------------------------------------------------------------------------
      TRAKT_WEBHOOK_SECRET: ""
      ABS_WEBHOOK_SECRET: ""
      STREMIO_WEBHOOK_SECRET: ""

      # ---------------------------------------------------------------------------
      # OPTIONAL — Shelfmark (book/audiobook search & download)
      # Leave SHELFMARK_URL empty to disable.
      # ---------------------------------------------------------------------------
      SHELFMARK_URL: ${SHELFMARK_URL:-}
      SHELFMARK_USERNAME: ${SHELFMARK_USERNAME:-}
      SHELFMARK_PASSWORD: ${SHELFMARK_PASSWORD:-}

  # ---------------------------------------------------------------------------
  # OPTIONAL — Audiobookshelf real-time progress sidecar
  # Leave ABS_URL empty to disable this service.
  # ---------------------------------------------------------------------------
  abs-listener:
    image: ghcr.io/twobitlab/vellum-abs-listener:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vellum:vellum@db:5432/vellum
      # ---------------------------------------------------------------------------
      # Set ABS_URL and ABS_TOKEN to enable live scrobbling.
      # ABS_TOKEN accepts either an API key (Settings → API Keys) or a personal
      # user token. The sidecar calls /api/me to exchange an API key for the JWT
      # token required by socket auth, so either credential type works.
      # Leave ABS_URL empty to disable (the service will exit cleanly on start).
      # ---------------------------------------------------------------------------
      ABS_URL: ""
      ABS_TOKEN: ""

volumes:
  postgres_data:
